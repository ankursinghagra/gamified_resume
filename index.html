<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
		<style>
			* {
				margin: 0;
				padding: 0;
			}
			body {
				background: black;
				overflow: hidden;
				font-family: 'Press Start 2P', cursive;
			}
			canvas {
				padding: 0;
				margin: 0;
				width: 100vw;
				max-width: 100%;
				height: auto;
				max-height: 100%;
				user-select: none;
			}
			
			/* UI Overlay */
			#ui-layer {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				pointer-events: none; /* Let clicks pass through to canvas by default */
				display: flex;
				flex-direction: column;
				justify-content: flex-end;
				align-items: center;
				padding-bottom: 20px;
				box-sizing: border-box;
				z-index: 10;
			}

			#notification {
				display: none;
				/* pointer-events: auto; */
				background: rgba(0, 0, 0, 0.8);
				padding: 1rem;
				border-radius: 4px;
				color: white;
				margin-bottom: 20px;
			}

            #audio-controls {
                position: absolute;
                top: 20px;
                right: 20px;
                pointer-events: auto;
                z-index: 30;
            }

            #zone-hint {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.75);
                color: #ffee00;
                font-size: 9px;
                padding: 6px 12px;
                border: 1px solid #ffee00;
                animation: hintFade 5s forwards;
                pointer-events: none;
                white-space: nowrap;
            }

            @keyframes hintFade {
                0%   { opacity: 1; }
                70%  { opacity: 1; }
                100% { opacity: 0; }
            }

			#modal-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.5);
				z-index: 20;
				pointer-events: auto;
				justify-content: center;
				align-items: center;
			}

			#modal-container {
				background: white;
				max-width: 600px;
				width: 90%;
				max-height: 80vh;
				overflow-y: auto;
				position: relative;
			}
			
			.close-btn {
				position: absolute;
				top: 10px;
				right: 10px;
			}

			/* Intro / Splash Screen */
			#intro-screen {
				position: fixed;
				inset: 0;
				z-index: 100;
				background: #0a0a0a;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				gap: 32px;
				padding: 24px;
			}
			#intro-screen h1 {
				font-size: clamp(14px, 3vw, 28px);
				color: #ffee00;
				text-align: center;
				text-shadow: 3px 3px 0 #7b6000;
				letter-spacing: 2px;
			}
			#intro-screen .subtitle {
				font-size: clamp(7px, 1.2vw, 11px);
				color: #aaa;
				text-align: center;
			}
			#intro-controls {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 16px 32px;
				max-width: 520px;
				width: 100%;
			}
			.ctrl-row {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.ctrl-key {
				background: #222;
				border: 2px solid #555;
				border-bottom: 4px solid #333;
				color: #fff;
				font-family: 'Press Start 2P', cursive;
				font-size: 9px;
				padding: 5px 9px;
				border-radius: 4px;
				white-space: nowrap;
				min-width: 36px;
				text-align: center;
				flex-shrink: 0;
			}
			.ctrl-desc {
				color: #ccc;
				font-size: 8px;
				line-height: 1.6;
			}
			#intro-start-btn {
				font-size: clamp(10px, 1.5vw, 14px);
				padding: 12px 36px;
				pointer-events: auto;
				animation: pulseBorder 1.2s infinite;
			}
			@keyframes pulseBorder {
				0%, 100% { box-shadow: 0 0 0 0 rgba(92,214,92,0.6); }
				50%       { box-shadow: 0 0 0 8px rgba(92,214,92,0); }
			}
		</style>
	</head>
	<body>
		<!-- Intro / Splash Screen -->
		<div id="intro-screen">
			<h1>&#x1F5FA; Ankur's World</h1>
			<p class="subtitle">A Gamified Resume Experience</p>

			<div class="nes-container is-dark" style="max-width:540px;width:100%;padding:24px 28px;">
				<p class="title" style="color:#ffee00;font-size:10px;margin-bottom:16px;">Controls</p>
				<div id="intro-controls">
					<div class="ctrl-row">
						<span class="ctrl-key">&#x2190; &#x2192;</span>
						<span class="ctrl-desc">Move left / right</span>
					</div>
					<div class="ctrl-row">
						<span class="ctrl-key">&#x2191; &#x2193;</span>
						<span class="ctrl-desc">Move up / down</span>
					</div>
					<div class="ctrl-row">
						<span class="ctrl-key">E</span>
						<span class="ctrl-desc">Interact with<br>notice board</span>
					</div>
				</div>
			</div>

			<button id="intro-start-btn" class="nes-btn is-success">&#x25BA; START</button>
		</div>

		<!-- UI Elements -->
		<div id="ui-layer">
            <div id="audio-controls">
                <button id="mute-btn" class="nes-btn is-error">🔇</button>
            </div>

            <div id="zone-hint">[H] Toggle Walkable Zones &nbsp;|&nbsp; 🟩 Walkable &nbsp; 🟥 Blocked &nbsp; 🟨 Interaction</div>

			<div id="notification" class="nes-container is-dark with-title">
				<p class="title">Action</p>
				<p>Press [E] to Interact</p>
			</div>
		</div>

		<div id="modal-overlay">
			<div id="modal-container" class="nes-dialog is-rounded">
				<form method="dialog">
					<p class="title" id="modal-title">Title</p>
					<div id="modal-content">Content goes here</div>
					<menu class="dialog-menu">
						<button id="modal-close" class="nes-btn">Close</button>
					</menu>
				</form>
			</div>
		</div>

		<!-- External Libraries -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
		<script src="assets/js/viewport.min.js"></script>
		
		<!-- Main Application Module -->
		<script type="module" src="js/main.js"></script>
	</body>
</html>
