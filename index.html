<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css?family=Press+Start+2P" rel="stylesheet">
		<style>
			* {
				margin: 0;
				padding: 0;
			}
			body {
				background: black;
				overflow: hidden;
				font-family: 'Press Start 2P', cursive;
			}
			canvas {
				padding: 0;
				margin: 0;
				width: 100vw;
				max-width: 100%;
				height: auto;
				max-height: 100%;
				user-select: none;
			}
			
			/* UI Overlay */
			#ui-layer {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				pointer-events: none; /* Let clicks pass through to canvas by default */
				display: flex;
				flex-direction: column;
				justify-content: flex-end;
				align-items: center;
				padding-bottom: 20px;
				box-sizing: border-box;
				z-index: 10;
			}

			#notification {
				display: none;
				/* pointer-events: auto; */
				background: rgba(0, 0, 0, 0.8);
				padding: 1rem;
				border-radius: 4px;
				color: white;
				margin-bottom: 20px;
			}

            #audio-controls {
                position: absolute;
                top: 20px;
                right: 20px;
                pointer-events: auto;
                z-index: 30;
            }

            #zone-hint {
                position: absolute;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.75);
                color: #ffee00;
                font-size: 9px;
                padding: 6px 12px;
                border: 1px solid #ffee00;
                animation: hintFade 5s forwards;
                pointer-events: none;
                white-space: nowrap;
            }

            @keyframes hintFade {
                0%   { opacity: 1; }
                70%  { opacity: 1; }
                100% { opacity: 0; }
            }

			#modal-overlay {
				display: none;
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: rgba(0, 0, 0, 0.5);
				z-index: 20;
				pointer-events: auto;
				justify-content: center;
				align-items: center;
			}

			#modal-container {
				background: white;
				max-width: 600px;
				width: 90%;
				max-height: 80vh;
				overflow-y: auto;
				position: relative;
			}
			
			.close-btn {
				position: absolute;
				top: 10px;
				right: 10px;
			}
		</style>
	</head>
	<body>
		<!-- UI Elements -->
		<div id="ui-layer">
            <div id="audio-controls">
                <button id="mute-btn" class="nes-btn is-error">🔇</button>
            </div>

            <div id="zone-hint">[H] Toggle Walkable Zones &nbsp;|&nbsp; 🟩 Walkable &nbsp; 🟥 Blocked &nbsp; 🟨 Interaction</div>

			<div id="notification" class="nes-container is-dark with-title">
				<p class="title">Action</p>
				<p>Press [E] to Interact</p>
			</div>
		</div>

		<div id="modal-overlay">
			<div id="modal-container" class="nes-dialog is-rounded">
				<form method="dialog">
					<p class="title" id="modal-title">Title</p>
					<div id="modal-content">Content goes here</div>
					<menu class="dialog-menu">
						<button id="modal-close" class="nes-btn">Close</button>
					</menu>
				</form>
			</div>
		</div>

		<!-- External Libraries -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.2/pixi.min.js"></script>
		<script src="assets/js/viewport.min.js"></script>
		
		<!-- Main Application Module -->
		<script type="module" src="js/main.js"></script>
	</body>
</html>
